version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: project1_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: project1
      MYSQL_DATABASE: project1
      MYSQL_USER: project1
      MYSQL_PASSWORD: 29042002
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: